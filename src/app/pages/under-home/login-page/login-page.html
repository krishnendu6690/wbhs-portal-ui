<div class="container login-page mt-10">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-4">
      <div class="card login-card">
        <div class="card-header login-header">Login</div>

        <div class="card-body">
          <form>
            <!-- User ID -->
            <div class="row mb-3 align-items-center">
              <label class="col-sm-4 col-form-label fw-semibold"> User ID </label>

              <div class="col-sm-8">
                <input type="text" class="form-control login-input" placeholder="Enter User ID" />
              </div>
            </div>

            <!-- Password -->
            <div class="row mb-3 align-items-center">
              <label class="col-sm-4 col-form-label fw-semibold"> Password </label>

              <div class="col-sm-8">
                <input
                  type="password"
                  class="form-control login-input"
                  placeholder="Enter Password"
                />
              </div>
            </div>

           <!-- Captcha -->
<div class="row mb-4 align-items-center">

  <label class="col-sm-4 col-form-label fw-semibold">
    Enter Captcha
  </label>

  <div class="col-sm-8">

    <div class="captcha-wrapper">

      <!-- Input -->
      <input
        type="text"
        class="form-control login-input captcha-input"
        placeholder="Enter Captcha">

      <!-- Captcha Image -->
      <div class="captcha-box">
        <img
          src="images/captcha.png"
          class="captcha-img"
          alt="Captcha">
      </div>

      <!-- Refresh -->
      <button
        type="button"
        class="refresh-btn">

        <i class="bi bi-arrow-repeat"></i>

      </button>

    </div>

  </div>

</div>
          </form>

          <!-- Buttons -->

          <!-- Forgot Password -->
        </div>
      </div>
    </div>
  </div>
</div>
