<div class="container-fluid mt-4">

  <div class="row g-4">

    <!-- LEFT COLUMN -->
    <div class="col-lg-3">

      <div class="card shadow-sm">
        <div class="card-header section-title">
          Quick Menu
        </div>

        <div class="list-group list-group-flush">

          <a class="list-group-item list-group-item-action">
            About the Scheme
          </a>

          <a class="list-group-item list-group-item-action">
            Facilities Available
          </a>

          <a class="list-group-item list-group-item-action">
            Hospitals
          </a>

          <a class="list-group-item list-group-item-action">
            Dashboard
          </a>

        </div>
      </div>

    </div>

    <!-- CENTER COLUMN -->
    <div class="col-lg-6">

      <div class="card shadow-sm news-card">

        <div class="card-header section-title">
          What's New / Coming Up Next
        </div>

        <div class="card-body">

          <ul class="news-list">

            @for(item of news; track item) {

            <li>
                {{ item }}
            </li>

            }

          </ul>

        </div>

      </div>

    </div>

    <!-- RIGHT COLUMN -->
    <div class="col-lg-3">

      <div class="card shadow-sm">

        <div class="card-header section-title">
          Quick Actions
        </div>

        <div class="list-group list-group-flush">

          <a class="list-group-item list-group-item-action">
            May I Assist You
          </a>

          <a class="list-group-item list-group-item-action">
            Package Details
          </a>

          <a class="list-group-item list-group-item-action">
            CARC Status
          </a>

          <a class="list-group-item list-group-item-action">
            Claim Reimbursement
          </a>

        </div>

      </div>

    </div>

  </div>

</div>
